# Spring Boot — enable web server
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:traindb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# H2 Console (optional, for debugging)
spring.h2.console.enabled=false

# Initialize schema then load data.sql
spring.sql.init.mode=always

# ─── Email (SMTP) ────────────────────────────────────────
# Configure with your SMTP provider. Example below uses Gmail.
# For Gmail: generate an App Password at https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:your_email@gmail.com}
spring.mail.password=${SMTP_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
