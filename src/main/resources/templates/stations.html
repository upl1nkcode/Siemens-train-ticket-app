<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('Manage Stations')"></head>
<body>
    <nav th:replace="layout :: sidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Manage Stations</h1>
        </div>

        <div th:replace="layout :: alerts"></div>

        <div class="dashboard-grid">
            <div class="glass-card" style="align-self: start;">
                <h2 style="margin-bottom: 1.5rem;">Add New Station</h2>
                
                <form th:action="@{/admin/stations/add}" method="post">
                    <div class="form-group">
                        <label class="form-label">Station Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="e.g. Bucharest Nord">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fa-solid fa-plus"></i> Add Station
                    </button>
                </form>
            </div>
            
            <div class="glass-card" style="grid-column: span 2;">
                <h2 style="margin-bottom: 1.5rem;">Station List</h2>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${stations}">
                                <td th:text="${s.id}"></td>
                                <td th:text="${s.name}"></td>
                                <td>
                                    <form th:action="@{/admin/stations/delete/{id}(id=${s.id})}" method="post" style="display: inline;">
                                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this station?');">
                                            <i class="fa-solid fa-trash"></i> Delete
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${stations.isEmpty()}">
                                <td colspan="3" style="text-align: center; color: var(--text-muted);">No stations configured.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
