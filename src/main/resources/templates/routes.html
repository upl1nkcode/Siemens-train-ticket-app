<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('Manage Routes')"></head>
<body>
    <nav th:replace="layout :: sidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Manage Routes</h1>
        </div>

        <div th:replace="layout :: alerts"></div>

        <div class="dashboard-grid">
            <div class="glass-card" style="align-self: start;">
                <h2 style="margin-bottom: 1.5rem;">Add New Route</h2>
                
                <form th:action="@{/admin/routes/add}" method="post">
                    <div class="form-group">
                        <label class="form-label">Route Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="e.g. Bucharest - Brasov Express">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Stations (Hold Ctrl to select multiple in order)</label>
                        <select name="stationIds" class="form-control" multiple size="8" required style="height: auto;">
                            <option th:each="s : ${stations}" th:value="${s.id}" th:text="${s.name}"></option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fa-solid fa-plus"></i> Add Route
                    </button>
                </form>
            </div>
            
            <div class="glass-card" style="grid-column: span 2;">
                <h2 style="margin-bottom: 1.5rem;">Route List</h2>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Stops (in order)</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${routes}">
                                <td th:text="${r.id}"></td>
                                <td th:text="${r.name}"></td>
                                <td>
                                    <span th:each="stop, iterStat : ${r.stops}">
                                        <span class="badge badge-primary" style="margin: 2px;" th:text="${stop.station.name}"></span>
                                        <i class="fa-solid fa-arrow-right" th:if="${!iterStat.last}" style="font-size: 0.6rem; color: var(--text-muted);"></i>
                                    </span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/routes/delete/{id}(id=${r.id})}" method="post" style="display: inline;">
                                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this route?');">
                                            <i class="fa-solid fa-trash"></i> Delete
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${routes.isEmpty()}">
                                <td colspan="4" style="text-align: center; color: var(--text-muted);">No routes configured.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
